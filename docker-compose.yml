services:
  # --- API GATEWAY ---
  traefik:
    image: traefik:v3.0
    container_name: erp-gateway
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      # Notice we removed the tcp://host.docker.internal line!
      - "--providers.docker.network=erp-network"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
    ports:
      - "80:80"
      - "8081:8080"
    volumes:
      # Changed back to standard Linux single slash
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
    networks:
      - erp-network

# ... the rest of your file (postgres, nats, redis, inventory) stays exactly the same!