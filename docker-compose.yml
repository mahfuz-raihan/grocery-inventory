networks:
  erp_network:
    driver: bridge

volumes:
  postgres_data:

services:
  # --- API GATEWAY ---
  traefik:
    image: traefik:v2.11
    container_name: erp-gateway
    environment:
      # FIX: Force Traefik to use a modern Docker API version to satisfy Ubuntu
      - DOCKER_API_VERSION=1.41
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
    ports:
      - "80:80"
      - "8082:8080" # Dashboard port
    volumes:
      # FIX: Native Linux single slash for maximum compatibility and speed
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
    networks:
      - erp_network
    restart: unless-stopped

  # --- INFRASTRUCTURE ---
  postgres:
    image: postgres:16-alpine
    container_name: erp-db
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - erp_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # --- MESSAGE BROKER ---
  nats:
    image: nats:alpine
    container_name: erp-nats
    command: ["-js"] # JetStream enabled
    ports:
      - "4222:4222"
      - "8222:8222" # NATS Dashboard
    networks:
      - erp_network
    restart: unless-stopped

  redis:
    image: redis:alpine
    container_name: erp-redis
    ports:
      - "6379:6379"
    networks:
      - erp_network
    restart: unless-stopped

  # --- MICROSERVICES ---
  auth-service:
    build:
      context: .
      dockerfile: ./services/auth/Dockerfile
    container_name: erp-auth
    restart: unless-stopped
    env_file:
      - .env
    networks:
      - erp_network
    depends_on:
      postgres:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.auth.rule=PathPrefix(`/api/v1/auth`)"
      - "traefik.http.routers.auth.entrypoints=web"
      - "traefik.http.services.auth.loadbalancer.server.port=8000"
      - "traefik.docker.network=erp_network"

  # --- INVENTORY SERVICE ---
  inventory-service:
    build:
      context: .
      dockerfile: ./services/inventory/Dockerfile
    container_name: erp-inventory
    restart: unless-stopped
    env_file:
      - .env
    networks:
      - erp_network
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_started
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.inventory.rule=PathPrefix(`/api/v1/inventory`)"
      - "traefik.http.routers.inventory.entrypoints=web"
      - "traefik.http.services.inventory.loadbalancer.server.port=8000"
      - "traefik.docker.network=erp_network"
    

  sales-service:
    build:
      context: .
      dockerfile: ./services/sales/Dockerfile
    container_name: erp-sales
    restart: unless-stopped
    env_file:
      - .env
    networks:
      - erp_network
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_started
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.sales.rule=PathPrefix(`/api/v1/sales`)"
      - "traefik.http.routers.sales.entrypoints=web"
      - "traefik.http.services.sales.loadbalancer.server.port=8000"
      - "traefik.docker.network=erp_network"

  # --- FRONTEND SERVICE ---
  frontend-service:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: erp-frontend
    restart: unless-stopped
    networks:
      - erp_network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=PathPrefix(`/`)"
      - "traefik.http.services.frontend.loadbalancer.server.port=3000"