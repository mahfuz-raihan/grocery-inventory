services:
  # --- API GATEWAY ---
  traefik:
    image: traefik:v3.0
    container_name: erp-gateway
    environment:
      # FIX: Force Traefik to use a modern Docker API version to satisfy Ubuntu
      - DOCKER_API_VERSION=1.41
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--entrypoints.web.address=:80"
    ports:
      - "80:80"
      - "8081:8080" # CHANGED: Moved from 8080 to 8081 to avoid local conflicts
    volumes:
      # FIX: Added double slash for Windows Docker Desktop compatibility
      - "//var/run/docker.sock:/var/run/docker.sock:ro"
    networks:
      - erp-network

  # --- DATABASE ---
  postgres:
    image: postgres:16-alpine
    container_name: erp-db
    env_file:
      - .env
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U admin -d erp_master" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - erp-network

  # --- MESSAGE BROKER ---
  nats:
    image: nats:2.10-alpine
    container_name: erp-messaging
    ports:
      - "4222:4222"
      - "8222:8222"
    networks:
      - erp-network

  # --- REDIS CACHE (NEW FOR SPRINT 2) ---
  redis:
    image: redis:7-alpine
    container_name: erp-redis
    ports:
      - "6379:6379"
    networks:
      - erp-network


# --- AUTHENTICATION SERVICE ---
  auth-service:
    build:
      context: .
      dockerfile: ./services/auth/Dockerfile
    container_name: erp-auth
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - erp-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.auth.rule=PathPrefix(`/api/v1/auth`)"
      - "traefik.http.routers.auth.entrypoints=web"
      - "traefik.http.services.auth.loadbalancer.server.port=8000"
      - "traefik.docker.network=erp-network"

  # --- INVENTORY SERVICE ---
  inventory-service:
    build:
      context: .
      dockerfile: ./services/inventory/Dockerfile
    container_name: erp-inventory
    ports:
      - "8000:8000"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.inventory.rule=PathPrefix(`/api/v1/inventory`)"
      - "traefik.http.routers.inventory.entrypoints=web"
      - "traefik.http.services.inventory.loadbalancer.server.port=8000"
      - "traefik.docker.network=erp-network"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_started
    networks:
      - erp-network

networks:
  erp-network:
    driver: bridge

volumes:
  postgres_data:
