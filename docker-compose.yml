services:
  # --- API GATEWAY ---
  traefik:
    image: traefik:v3.0
    container_name: erp-gateway
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      # Notice we removed the tcp://host.docker.internal line!
      - "--providers.docker.network=erp-network"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
    ports:
      - "80:80"
      - "8082:8080"
    volumes:
      # Changed back to standard Linux single slash
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
    networks:
      - erp-network

  # --- DATABASE ---
  postgres:
    image: postgres:16-alpine
    container_name: erp-db
    env_file:
      - .env
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d erp_master"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - erp-network

  # --- MESSAGE BROKER ---
  nats:
    image: nats:2.10-alpine
    container_name: erp-messaging
    ports:
      - "4222:4222"
      - "8222:8222"
    networks:
      - erp-network

  # --- REDIS CACHE (NEW FOR SPRINT 2) ---
  redis:
    image: redis:7-alpine
    container_name: erp-redis
    ports:
      - "6379:6379"
    networks:
      - erp-network

  # --- INVENTORY SERVICE ---
  inventory-service:
    build:
      context: .
      dockerfile: ./services/inventory/Dockerfile
    container_name: erp-inventory
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.inventory.rule=PathPrefix(`/api/v1/inventory`)"
      - "traefik.http.services.inventory.loadbalancer.server.port=8000"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_started
    networks:
      - erp-network

networks:
  erp-network:
    name: erp-network
    driver: bridge

volumes:
  postgres_data: